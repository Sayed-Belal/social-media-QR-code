<!DOCTYPE html>
<html>

<head>

<title>Social QR</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

body{
font-family:sans-serif;
max-width:420px;
margin:auto;
text-align:center;
padding:20px;
}

input{
display:block;
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px 20px;
}

a{
display:block;
padding:12px;
margin:8px;
background:#eee;
border-radius:8px;
text-decoration:none;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

const db = window.supabase.createClient(
"https://eeaplousimpgqfvkgzzo.supabase.co",
"sb_publishable_U5bpC42sjdz6RkJl89MhJw_ldIwQUt3"
)

const username = window.location.hash.replace("#","")

if(!username){

document.getElementById("app").innerHTML = `

<h2>Create Your Page</h2>

<input id="username" placeholder="username">
<input id="name" placeholder="name">
<input id="bio" placeholder="bio">

<input id="twitter" placeholder="twitter link">
<input id="instagram" placeholder="instagram link">
<input id="linkedin" placeholder="linkedin link">

<button onclick="create()">Create Page</button>

`

}

else{

loadProfile()

}

async function create(){

const data = {

username:document.getElementById("username").value,
name:document.getElementById("name").value,
bio:document.getElementById("bio").value,
twitter:document.getElementById("twitter").value,
instagram:document.getElementById("instagram").value,
linkedin:document.getElementById("linkedin").value

}

await supabase.from("profiles").insert(data)

alert("Page created!")

window.location = "#"+data.username

location.reload()

}

async function loadProfile(){

const {data} = await db
.from("profiles")
.select("*")
.eq("username",username)
.single()

document.getElementById("app").innerHTML = `

<h2>${data.name}</h2>

<p>${data.bio}</p>

<canvas id="qr"></canvas>

<div id="links"></div>

`

QRCode.toCanvas(
document.getElementById("qr"),
window.location.href
)

const links = [
{n:"Twitter",v:data.twitter},
{n:"Instagram",v:data.instagram},
{n:"LinkedIn",v:data.linkedin}
]

links.forEach(l=>{
if(l.v){
const a=document.createElement("a")
a.href=l.v
a.innerText=l.n
document.getElementById("links").appendChild(a)
}
})

}

</script>

</body>
</html>
